target:
  url: https://example-product.test
  device: desktop
  browser: chrome
  context: Evaluate a deployed or locally tunneled product as the customer profile.
customer_job:
  functional: Complete the product's core workflow and decide whether it solves the customer problem.
  emotional: Feel confident enough to trust the result in real work.
  social: Be able to justify the result to a teammate, manager, or client.
  importance: 8
tasks:
  - id: core-workflow
    title: Attempt the core workflow
    instructions: Use realistic inputs and record blockers, confusing moments, evidence, and recommendations.
    success_criteria:
      - The customer can complete the workflow without developer knowledge.
      - The output is clear, trustworthy, and actionable.
      - Any failure states explain what happened and what to do next.
notes: >
  Keep findings customer-centered: interpretation, business impact, likely
  frequency, recommendation, severity, confidence, trust blocker, and core task
  blocker. For built-in browser evidence, run with --runner
  openclaw-windows-cdp to collect screenshots, DOM/workflow cues, trust-copy
  checks, accessibility basics, layout overflow, and resource-health markers.
