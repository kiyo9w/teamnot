name: Example customer flow pack
reset_between_flows: true
flows:
  - name: Core onboarding journey
    start_url: /signup
    steps:
      - id: enter-email
        action: fill
        selector: "input[type=email]"
        value: customer@example.com
        description: Enter realistic customer email.
      - id: choose-plan
        action: click_text
        text: Start free trial
        description: Start the primary acquisition flow.
      - id: onboarding-loaded
        action: wait_for_text
        text: Welcome
        timeout_ms: 15000
        description: Confirm the customer reaches onboarding.
      - id: no-technical-error
        action: assert_no_text
        text: Traceback
        description: Ensure the path does not expose developer errors.
  - name: Workspace setup journey
    start_url: /app/projects
    steps:
      - id: create-project
        action: click_text
        text: New project
        description: Start the main in-product job.
      - id: name-project
        action: fill
        selector: "#project-name"
        value: Q2 Migration
        description: Use realistic customer input.
      - id: save-project
        action: click_text
        text: Create
        description: Submit the workflow.
      - id: project-ready
        action: wait_for_url
        url: /projects/
        timeout_ms: 15000
        description: Confirm the workflow reaches a created project.
  - name: File import journey
    start_url: /imports
    steps:
      - id: upload-file
        action: upload
        selector: "input[type=file]"
        file: /absolute/path/to/customer-data.csv
        description: Optional action for products whose core workflow needs files.
      - id: import-ready
        action: wait_for_enabled
        selector: "button[type=submit]"
        description: Confirm the product accepts the selected file.
