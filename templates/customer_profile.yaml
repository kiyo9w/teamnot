persona: Shopify agency operations lead
role: operations lead
seniority: senior
domain_literacy: high
current_workflow: Uses spreadsheets and platform admin tools to validate client data before production changes.
buying_trigger: Repeated operational errors create client risk or expensive manual review.
alternatives:
  - manual spreadsheet review
  - platform admin spot checks
buyer_user_split: Buyer and daily user may be the same person in a small agency; larger teams may separate budget approval from operations.
trust_threshold: Must explain risky results clearly, avoid false certainty, and provide evidence the team can act on.
