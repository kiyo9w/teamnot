definition_of_done:
  require_all_pass: true
  llm_judge_required: false
  checks:
    - name: ruff passes
      run: uv run ruff check .
      expect_exit: 0
      timeout_s: 180
    - name: full tests pass
      run: uv run pytest -q
      expect_exit: 0
      timeout_s: 600
    - name: browser session script parses
      run: node --check src/teamnot/customer_loop/winbrowser_session.mjs
      expect_exit: 0
      timeout_s: 120
    - name: customer-loop docs mention researcher and seeded state
      file_contains:
        docs/customer-loop.md: seeded
      required: true
    - name: customer researcher dogfood runs on Bulletproof React
      run: |
        rm -rf .teamnot/customer-loop/bulletproof-react-eval/overnight-dod
        uv run teamnot customer-loop \
          --target http://127.0.0.1:3000/ \
          --profile .teamnot/customer-loop/bulletproof-react-eval/customer_profile.yaml \
          --out .teamnot/customer-loop/bulletproof-react-eval/overnight-dod \
          --runner openclaw-windows-researcher \
          --max-iterations 1 \
          --severity-threshold medium \
          --no-run-teamnot
      expect_exit: 0
      timeout_s: 900
    - name: dogfood captures researcher evidence
      file_contains:
        .teamnot/customer-loop/bulletproof-react-eval/overnight-dod/customer_report.md: "browser_research_brain"
      required: true
    - name: final handover exists
      file_exists: .teamnot/reports/CUSTOMER-RESEARCHER-UTMOST-20260522.md
      required: true

deliverable:
  type: feature_branch
