budget:
  max_minutes: 720
  max_usd: 0.0
  max_retries: 20
  max_dod_attempts: 50
  cost_guard_enabled: true
  cost_warn_pct: 0.7
  cost_pause_pct: 0.9
  cost_hard_stop_pct: 1.0
  require_explicit_api_optin: true
  allowed_metered_workers: []

notes: |
  This is an overnight self-improvement lane. Prefer subscription workers:
  Claude CLI first, Codex fallback when Claude errors, times out, rate-limits,
  or reaches usage limits. Do not use metered API workers.

  The final standard is not "tests pass"; it is an honest, production-grade
  customer-researcher capability that is general across product types and does
  not overclaim browser/customer evidence.
